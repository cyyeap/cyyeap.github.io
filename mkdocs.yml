site_name: Choon Yin's ____________
theme:
  name: material
use_directory_urls: false
plugins:
  - rss:
      match_path: blog/category/security/
      date_from_meta:
        as_creation: date
      categories:
        - categories
  - blog: 
      archive_date_format: MMMM yyyy 
      post_date_format: full
      post_excerpt: optional
      post_readtime: true
      categories_name: Categories
      categories_url_format: "category/{slug}"
  - search: 
      lang: 
        - en
        - zh